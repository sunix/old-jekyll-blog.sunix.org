aboutme: I am an experienced software engineer and tech lead with over 15 years of expertise in developing, maintaining, and enhancing Java applications and cloud-native solutions. I have a proven track record of contributing to open-source projects like Eclipse JKube, Fabric8 Kubernetes Java Client, Eclipse Che, and Eclipse Theia. As a passionate advocate for the Java community, I have been an active member of the ParisJUG crew since 2015, serving as JUG Leader from 2019 to 2023. Additionally, I have supported Devoxx France as part of the "gilets rouges" team. My technical skills span across various programming languages, frameworks, and cloud technologies, and I am dedicated to continuous learning and sharing knowledge through conferences and community involvement.
